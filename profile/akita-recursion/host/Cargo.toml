[package]
name = "akita-recursion-host"
version = "0.1.0"
edition = "2021"
description = "Run the Akita verifier inside a Jolt zkVM guest program."
authors = ["Omid Bodaghi <omibo@layerzero.foundation>"]
license = "Apache-2.0 OR MIT"
publish = false

[package.metadata.cargo-machete]
ignored = ["jolt-sdk", "jolt-sdk-macros"]

[[bin]]
name = "akita-recursion-host"
path = "src/main.rs"

[dependencies]
jolt-sdk = { git = "https://github.com/a16z/jolt", rev = "2509bdcea9bb3e8978bb578380383ef06dbbada7", default-features = false, features = [
  "host",
] }
# We pin `jolt-sdk-macros` with `guest-std` directly so that the
# `#[jolt::provable]` macro emits `program.set_std(true)` (the macro reads
# its own `cfg(feature = "guest-std")` at host compile time). Going through
# `jolt-sdk/guest-std` would also pull `zeroos-runtime-musl` in for the
# host build, which fails to link on macOS / non-musl platforms.
jolt-sdk-macros = { git = "https://github.com/a16z/jolt", rev = "2509bdcea9bb3e8978bb578380383ef06dbbada7", features = [
  "guest-std",
] }
guest = { package = "akita-recursion-guest", path = "../guest", features = [
  "benchmark-artifact",
] }
akita-recursion-glue = { path = "../glue" }
akita-config = { path = "../../../crates/akita-config", default-features = false, features = [
  "verifier-adapter",
] }
akita-transcript = { path = "../../../crates/akita-transcript" }
akita-types = { path = "../../../crates/akita-types" }
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
clap = { version = "4", features = ["derive"] }

[lints.rust]
missing_docs = "warn"

[lints.clippy]
missing_errors_doc = "warn"
missing_panics_doc = "warn"
