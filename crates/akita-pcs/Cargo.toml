[package]
name = "akita-pcs"
version = "0.1.0"
edition = "2021"
rust-version = "1.95"
authors = [
  "Markos Georghiades <mgeorghiades@a16z.com>",
  "Quang Dao <qvd@andrew.cmu.edu>",
  "Amirhossein Khajehpour <amir.kh@layerzerolabs.org>",
  "Omid Bodaghi <omibo@layerzero.foundation>",
  "Giuseppe Vitto <giuseppe.vitto@layerzerolabs.org>",
]
license = "Apache-2.0 OR MIT"
description = "A high performance and modular implementation of the Akita polynomial commitment scheme."
repository = "https://github.com/LayerZero-Labs/akita"
documentation = "https://docs.rs/akita-pcs"
readme = "../../README.md"
keywords = [
  "cryptography",
  "zkp",
  "commitment",
  "polynomial",
  "pcs",
  "lattice",
  "post-quantum",
]
categories = ["cryptography", "algorithms"]
include = ["src/**", "examples/**", "benches/**", "Cargo.toml"]

[package.metadata.docs.rs]
all-features = true

[package.metadata.cargo-machete]
ignored = ["akita-setup", "blake2", "thiserror"]

[features]
default = ["parallel", "planner"]
parallel = [
  "dep:rayon",
  "akita-algebra/parallel",
  "akita-config/parallel",
  "akita-field/parallel",
  "akita-prover/parallel",
  "akita-scheme/parallel",
  "akita-setup/parallel",
  "akita-sumcheck/parallel",
  "akita-verifier/parallel",
]
disk-persistence = ["akita-setup/disk-persistence"]
logging-transcript = ["akita-transcript/logging-transcript"]
planner = [
  "akita-config/planner",
  "akita-scheme/planner",
  "akita-setup/planner",
]
zk = [
  "akita-config/zk",
  "akita-prover/zk",
  "akita-scheme/zk",
  "akita-setup/zk",
  "akita-types/zk",
  "akita-verifier/zk",
]

[dependencies]
thiserror = "2.0"
rand_core = { version = "0.6", features = ["getrandom"] }
akita-algebra = { version = "0.1.0", path = "../akita-algebra" }
akita-challenges = { version = "0.1.0", path = "../akita-challenges" }
akita-config = { version = "0.1.0", path = "../akita-config" }
akita-field = { version = "0.1.0", path = "../akita-field" }
akita-serialization = { version = "0.1.0", path = "../akita-serialization" }
akita-sumcheck = { version = "0.1.0", path = "../akita-sumcheck" }
akita-transcript = { version = "0.1.0", path = "../akita-transcript" }
akita-types = { version = "0.1.0", path = "../akita-types" }
akita-verifier = { version = "0.1.0", path = "../akita-verifier" }
akita-prover = { version = "0.1.0", path = "../akita-prover" }
akita-scheme = { version = "0.1.0", path = "../akita-scheme" }
akita-setup = { version = "0.1.0", path = "../akita-setup" }
tracing = "0.1"
rayon = { version = "1.12", optional = true }
blake2 = "0.10.6"

[dev-dependencies]
rand = "0.8"
criterion = { version = "0.8.2", features = ["html_reports"] }
num-bigint = "0.4.6"
proptest = "1.6"
akita-planner = { version = "0.1.0", path = "../akita-planner" }
ark-bn254 = { git = "https://github.com/arkworks-rs/algebra", rev = "3b2a12492cfeb34774a2cdbe9d8d7a869c883fa9", features = [
  "scalar_field",
] }
ark-ff = { git = "https://github.com/arkworks-rs/algebra", rev = "3b2a12492cfeb34774a2cdbe9d8d7a869c883fa9" }
tracing-chrome = "0.7"
tracing-subscriber = { version = "0.3", features = ["env-filter", "registry"] }

[[example]]
name = "profile"
path = "examples/profile/main.rs"

[[bench]]
name = "ring_ntt"
harness = false

[[bench]]
name = "field_arith"
harness = false

[[bench]]
name = "akita_e2e"
harness = false

[[bench]]
name = "onehot_batched_commit"
harness = false

[[bench]]
name = "onehot_batched_opening"
harness = false

[[bench]]
name = "root_kernels"
harness = false

[[bench]]
name = "extension_opening_reduction"
harness = false

[[bench]]
name = "onehot_root_projection_commit"
harness = false

[[bench]]
name = "fft_smooth"
harness = false

[lints]
workspace = true
