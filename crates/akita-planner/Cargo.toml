[package]
name = "akita-planner"
version = "0.1.0"
edition = "2021"
rust-version = "1.95"
authors = [
  "Markos Georghiades <mgeorghiades@a16z.com>",
  "Quang Dao <qvd@andrew.cmu.edu>",
  "Amirhossein Khajehpour <amir.kh@layerzerolabs.org>",
  "Omid Bodaghi <omibo@layerzero.foundation>",
  "Giuseppe Vitto <giuseppe.vitto@layerzerolabs.org>",
]
license = "Apache-2.0 OR MIT"
description = "Offline schedule planner for the Akita polynomial commitment scheme"
repository = "https://github.com/LayerZero-Labs/akita"
readme = "../../README.md"

[package.metadata.cargo-machete]
ignored = ["akita-algebra"]

[dependencies]
akita-algebra = { version = "0.1.0", path = "../akita-algebra" }
akita-challenges = { version = "0.1.0", path = "../akita-challenges" }
akita-config = { version = "0.1.0", path = "../akita-config" }
akita-field = { version = "0.1.0", path = "../akita-field" }
akita-types = { version = "0.1.0", path = "../akita-types" }
tracing = "0.1"

[dev-dependencies]
# Test-only: the `proof_size.rs` byte-formula tests construct synthetic
# `AkitaLevelProof` / `TerminalLevelProof` bodies and compare their
# serialized size against the formula.
akita-serialization = { version = "0.1.0", path = "../akita-serialization" }
akita-sumcheck = { version = "0.1.0", path = "../akita-sumcheck" }

[features]
default = []
parallel = ["akita-algebra/parallel", "akita-field/parallel"]
zk = ["akita-config/zk", "akita-types/zk"]
# Test-only utilities. Gates `PlannerCfg<Cfg>` (the DP-routing `Cfg` wrapper
# used by cross-crate test fixtures). Off by default so production callers
# never include it.
test-utils = []

[lints]
workspace = true
