[package]
name = "akita-planner"
version = "0.1.0"
edition = "2021"
rust-version = "1.88"
authors = [
  "Markos Georghiades <mgeorghiades@a16z.com>",
  "Quang Dao <qvd@andrew.cmu.edu>",
  "Amirhossein Khajehpour <amir.kh@layerzerolabs.org>",
  "Omid Bodaghi <omibo@layerzero.foundation>",
  "Giuseppe Vitto <giuseppe.vitto@layerzerolabs.org>",
]
license = "Apache-2.0 OR MIT"
description = "Offline schedule planner for the Akita polynomial commitment scheme"
repository = "https://github.com/LayerZero-Labs/hachi"
readme = "../../README.md"

[package.metadata.cargo-machete]
ignored = ["akita-algebra"]

[dependencies]
akita-field = { version = "0.1.0", path = "../akita-field" }
akita-algebra = { version = "0.1.0", path = "../akita-algebra" }
akita-challenges = { version = "0.1.0", path = "../akita-challenges" }
akita-types = { version = "0.1.0", path = "../akita-types" }
tracing = "0.1"

[features]
default = []
parallel = ["akita-algebra/parallel", "akita-field/parallel"]
zk = ["akita-types/zk"]

[[bin]]
name = "akita-planner"
path = "src/bin/akita-planner.rs"

[lints]
workspace = true
