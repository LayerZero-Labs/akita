name: Spec Tracking

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  labels:
    name: Label spec PRs
    runs-on: ubuntu-latest
    steps:
      - name: Ensure labels exist
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh label create "spec" --repo "$GITHUB_REPOSITORY" --description "PR contains a spec" --color "0E8A16" 2>/dev/null || true
          gh label create "no-spec" --repo "$GITHUB_REPOSITORY" --description "PR has no spec file" --color "E4E669" 2>/dev/null || true
          gh label create "implementation" --repo "$GITHUB_REPOSITORY" --description "PR contains implementation of a spec" --color "1D76DB" 2>/dev/null || true
          gh label create "spec-review-request" --repo "$GITHUB_REPOSITORY" --description "Requests structured spec review" --color "D4C5F9" 2>/dev/null || true
          gh label create "spec-approved" --repo "$GITHUB_REPOSITORY" --description "Spec is approved for implementation" --color "5319E7" 2>/dev/null || true

      - name: Detect spec and implementation changes
        id: detect
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          has_spec=false
          has_code=false

          while IFS= read -r file; do
            [ -z "$file" ] && continue
            case "$file" in
              specs/*.md)
                basename=$(basename "$file")
                if [ "$basename" != "README.md" ] && [ "$basename" != "TEMPLATE.md" ]; then
                  has_spec=true
                fi
                ;;
              *)
                has_code=true
                ;;
            esac
          done < <(gh api "repos/${GITHUB_REPOSITORY}/pulls/${PR_NUMBER}/files" \
            --paginate \
            --jq '.[].filename')

          echo "has_spec=$has_spec" >> "$GITHUB_OUTPUT"
          echo "has_code=$has_code" >> "$GITHUB_OUTPUT"

      - name: Apply labels
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          HAS_SPEC: ${{ steps.detect.outputs.has_spec }}
          HAS_CODE: ${{ steps.detect.outputs.has_code }}
        run: |
          if [ "$HAS_SPEC" = "true" ]; then
            gh pr edit "$PR_NUMBER" --repo "$GITHUB_REPOSITORY" --add-label "spec" --remove-label "no-spec" 2>/dev/null || true
          else
            gh pr edit "$PR_NUMBER" --repo "$GITHUB_REPOSITORY" --add-label "no-spec" --remove-label "spec" 2>/dev/null || true
          fi

          if [ "$HAS_SPEC" = "true" ] && [ "$HAS_CODE" = "true" ]; then
            gh pr edit "$PR_NUMBER" --repo "$GITHUB_REPOSITORY" --add-label "implementation" 2>/dev/null || true
          else
            gh pr edit "$PR_NUMBER" --repo "$GITHUB_REPOSITORY" --remove-label "implementation" 2>/dev/null || true
          fi

  large-pr-warning:
    name: Warn on large PRs without specs
    runs-on: ubuntu-latest
    if: github.event.action == 'opened' || github.event.action == 'synchronize'
    steps:
      - name: Check PR size
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail

          lines=0
          has_spec=false

          while IFS=$'\t' read -r file additions deletions; do
            [ -z "$file" ] && continue
            case "$file" in
              specs/*.md)
                basename=$(basename "$file")
                if [ "$basename" != "README.md" ] && [ "$basename" != "TEMPLATE.md" ]; then
                  has_spec=true
                fi
                ;;
              *)
                lines=$((lines + additions + deletions))
                ;;
            esac
          done < <(gh api "repos/${GITHUB_REPOSITORY}/pulls/${PR_NUMBER}/files" \
            --paginate \
            --jq '.[] | [.filename, .additions, .deletions] | @tsv')

          if [ "$lines" -le 500 ] || [ "$has_spec" = "true" ]; then
            exit 0
          fi

          existing=$(gh pr view "$PR_NUMBER" --repo "$GITHUB_REPOSITORY" --json comments --jq '.comments[].body' | grep -c "more than 500 changed lines" || true)
          if [ "$existing" -ne 0 ]; then
            exit 0
          fi

          body="> [!WARNING]"
          body="$body
          > This PR has **more than 500 changed lines** and does not include a spec."
          body="$body
          >
          > Large features and architectural changes benefit from a short spec before implementation review."
          body="$body
          > See CONTRIBUTING.md for the spec workflow."
          body="$body
          >
          > If this PR is a bug fix, small cleanup, or otherwise does not warrant a spec, feel free to ignore this message."

          gh pr comment "$PR_NUMBER" --repo "$GITHUB_REPOSITORY" --body "$body" || true
