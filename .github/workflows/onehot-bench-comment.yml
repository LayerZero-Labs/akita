name: Onehot 32 Variables Benchmark Comment

on:
  workflow_run:
    workflows: ["Onehot 32 Variables Benchmark"]
    types: [completed]

permissions:
  actions: read
  contents: read
  issues: write
  pull-requests: write

env:
  AKITA_BENCH_ARTIFACT_NAME: onehot-bench-32-variables-data

jobs:
  comment:
    if: >-
      github.event.workflow_run.event == 'pull_request' &&
      github.event.workflow_run.conclusion != 'cancelled'
    runs-on: ubuntu-latest
    steps:
      - name: Resolve PR number
        id: pr
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
        with:
          script: |
            const prs = context.payload.workflow_run.pull_requests || [];
            if (prs.length === 0) {
              core.info('No pull request associated with this workflow run.');
              core.setOutput('issue-number', '');
              return;
            }

            core.setOutput('issue-number', String(prs[0].number));

      - name: Download benchmark artifact
        if: steps.pr.outputs.issue-number != ''
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: ${{ env.AKITA_BENCH_ARTIFACT_NAME }}
          path: ${{ runner.temp }}/onehot-bench-artifact
          run-id: ${{ github.event.workflow_run.id }}
          repository: ${{ github.repository }}
          github-token: ${{ github.token }}

      - name: Upsert benchmark PR comment
        if: steps.pr.outputs.issue-number != ''
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
        env:
          AKITA_BENCH_COMMENT: ${{ runner.temp }}/onehot-bench-artifact/comment.md
          AKITA_BENCH_ISSUE_NUMBER: ${{ steps.pr.outputs.issue-number }}
        with:
          script: |
            const fs = require('fs');
            const commentPath = process.env.AKITA_BENCH_COMMENT;
            if (!fs.existsSync(commentPath)) {
              core.warning('No benchmark comment body found in benchmark artifact.');
              return;
            }

            const markers = [
              '<!-- akita-onehot-bench-report -->',
              '<!-- hachi-onehot-bench-report -->',
            ];
            const body = fs.readFileSync(commentPath, 'utf8');
            const { owner, repo } = context.repo;
            const issue_number = Number(process.env.AKITA_BENCH_ISSUE_NUMBER);

            const comments = await github.paginate(
              github.rest.issues.listComments,
              { owner, repo, issue_number, per_page: 100 }
            );
            const existing = comments.find(comment =>
              comment.user?.login === 'github-actions[bot]' &&
              markers.some(marker => comment.body?.includes(marker))
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body,
              });
            }
