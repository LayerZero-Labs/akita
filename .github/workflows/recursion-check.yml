name: Recursion check

on:
  push:
    branches: [main]
    paths:
      - crates/**
      - profile/akita-recursion/**
  pull_request:
    branches: ["**", main]
    paths:
      - crates/**
      - profile/akita-recursion/**

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  recursion-subworkspace:
    name: Recursion glue + compile
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: profile/akita-recursion
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions-rust-lang/setup-rust-toolchain@a0b538fa0b742a6aa35d6e2c169b4bd06d225a98 # v1
        with:
          toolchain: 1.95
          targets: riscv32imac-unknown-none-elf,riscv64imac-unknown-none-elf
          cache: false
      - name: Cache recursion subworkspace
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: profile/akita-recursion
          shared-key: ci-recursion-check
          cache-on-failure: true
      - name: Glue unit tests
        run: cargo test -p akita-recursion-glue
      - name: Release compile check (artifact + host)
        run: cargo check --release
