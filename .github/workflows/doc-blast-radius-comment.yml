name: Documentation blast-radius comment

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

env:
  AKITA_DOC_BLAST_RADIUS_MARKER: "<!-- akita-doc-blast-radius -->"

jobs:
  comment:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Render blast-radius report
        run: |
          python3 scripts/doc_blast_radius.py \
            --base "${{ github.event.pull_request.base.sha }}" \
            --head "${{ github.event.pull_request.head.sha }}" \
            --output "${{ runner.temp }}/doc-blast-radius-comment.md"

      - name: Upsert PR comment
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
        env:
          AKITA_DOC_BLAST_RADIUS_COMMENT: ${{ runner.temp }}/doc-blast-radius-comment.md
        with:
          script: |
            const fs = require('fs');
            const marker = process.env.AKITA_DOC_BLAST_RADIUS_MARKER;
            const commentPath = process.env.AKITA_DOC_BLAST_RADIUS_COMMENT;
            if (!fs.existsSync(commentPath)) {
              core.warning('No blast-radius comment body found.');
              return;
            }
            const body = fs.readFileSync(commentPath, 'utf8');
            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;

            const comments = await github.paginate(
              github.rest.issues.listComments,
              { owner, repo, issue_number, per_page: 100 }
            );
            const existing = comments.find((comment) =>
              comment.user?.login === 'github-actions[bot]' &&
              comment.body?.includes(marker)
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body,
              });
            }
