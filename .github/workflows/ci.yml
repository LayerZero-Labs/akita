name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: ["**", main]

permissions:
  contents: read

env:
  RUSTFLAGS: -D warnings
  CARGO_TERM_COLOR: always

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions-rust-lang/setup-rust-toolchain@a0b538fa0b742a6aa35d6e2c169b4bd06d225a98 # v1
        with:
          components: rustfmt
      - name: Check formatting
        run: cargo fmt --all --check

  taplo:
    name: TOML format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Install taplo
        uses: taiki-e/install-action@f092c064826410a38929a5791d2c0225b94432fe # taplo-cli
        with:
          tool: taplo-cli
      - name: Check TOML formatting
        run: taplo fmt --check

  rust-file-lines:
    name: Rust file line cap
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Test Rust file line checker
        run: scripts/test-rust-file-lines.sh
      - name: Enforce Rust file line cap (zero exceptions)
        run: scripts/check-rust-file-lines.sh --no-baseline

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions-rust-lang/setup-rust-toolchain@a0b538fa0b742a6aa35d6e2c169b4bd06d225a98 # v1
        with:
          components: clippy
      - name: Clippy (transparent default features)
        run: cargo clippy --all --all-targets --release --no-default-features --features parallel,disk-persistence -- -D warnings
      - name: Clippy (no default features)
        run: cargo clippy --all --all-targets --release --no-default-features -- -D warnings
      - name: Crate dependency hygiene
        run: |
          scripts/check-crate-deps.sh akita-verifier
          scripts/check-crate-deps.sh akita-prover
          scripts/check-crate-deps.sh akita-config
          scripts/check-crate-deps.sh akita-planner
          scripts/check-crate-deps.sh akita-setup

  machete:
    name: Unused dependencies
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Install cargo-machete
        uses: taiki-e/install-action@f092c064826410a38929a5791d2c0225b94432fe # cargo-machete
        with:
          tool: cargo-machete
      - name: Check unused dependencies
        run: cargo machete --with-metadata

  jolt-compat:
    name: Jolt compatibility
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions-rust-lang/setup-rust-toolchain@a0b538fa0b742a6aa35d6e2c169b4bd06d225a98 # v1
        with:
          components: clippy
      - name: Clippy akita-field jolt-compat
        run: cargo clippy -p akita-field --all-targets --release --features jolt-compat -- -D warnings
      - name: Test akita-field jolt-compat
        run: cargo test --release -p akita-field --features jolt-compat

  doc:
    name: Documentation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions-rust-lang/setup-rust-toolchain@a0b538fa0b742a6aa35d6e2c169b4bd06d225a98 # v1
      - name: Build documentation
        run: cargo doc -q --release --no-deps --no-default-features --features parallel,disk-persistence
        env:
          RUSTDOCFLAGS: -D warnings

  test:
    name: Test (${{ matrix.shard }}/${{ strategy.job-total }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions-rust-lang/setup-rust-toolchain@a0b538fa0b742a6aa35d6e2c169b4bd06d225a98 # v1
        with:
          cache: false
      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          shared-key: ci-test-release
          add-job-id-key: false
          cache-on-failure: true
      - name: Install cargo-nextest
        uses: taiki-e/install-action@f092c064826410a38929a5791d2c0225b94432fe # nextest
      - name: Run tests
        env:
          SHARD_INDEX: ${{ matrix.shard }}
          SHARD_TOTAL: ${{ strategy.job-total }}
        run: |
          artifact_dir="$RUNNER_TEMP/ci-test-pass-shard-${SHARD_INDEX}"
          mkdir -p "$artifact_dir"
          start_epoch=$(date +%s)
          set +e
          cargo nextest run --profile ci --cargo-profile ci-test --no-default-features --features parallel,disk-persistence \
            --partition "slice:${SHARD_INDEX}/${SHARD_TOTAL}"
          status=$?
          end_epoch=$(date +%s)
          if [ -f target/nextest/ci/junit.xml ]; then
            cp target/nextest/ci/junit.xml "$artifact_dir/junit-shard-${SHARD_INDEX}.xml"
          fi
          printf '{"started_at_epoch":%s,"finished_at_epoch":%s,"exit_code":%s,"shard_index":%s,"shard_total":%s}\n' \
            "$start_epoch" "$end_epoch" "$status" "$SHARD_INDEX" "$SHARD_TOTAL" \
            > "$artifact_dir/timing-shard-${SHARD_INDEX}.json"
          exit "$status"
      - name: Upload test shard artifact
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: ci-test-pass-shard-${{ matrix.shard }}
          path: ${{ runner.temp }}/ci-test-pass-shard-${{ matrix.shard }}
          if-no-files-found: warn
          retention-days: 7

  test-all-schedules-drift:
    name: Schedule table drift (all-schedules)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions-rust-lang/setup-rust-toolchain@a0b538fa0b742a6aa35d6e2c169b4bd06d225a98 # v1
        with:
          cache: false
      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          shared-key: ci-test-all-schedules-drift
          add-job-id-key: false
          cache-on-failure: true
      - name: Drift guard (all-schedules)
        run: |
          cargo test --release -p akita-config --features all-schedules generated_schedule_tables_match_find_schedule
      - name: Schedule catalog wiring
        run: |
          cargo test --release -p akita-config --no-default-features --test schedule_catalog_feature_off
          cargo test --release -p akita-config --features schedules-fp128-d64-onehot,schedules-fp128-d64-full --test schedule_catalog_miswire

  test-timing:
    name: Test timing
    needs: [test]
    if: always() && needs.test.result != 'cancelled'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Test timing script fixtures
        run: python3 -m unittest discover -s scripts/tests -p "test_*.py"
      - name: Download test shard artifacts
        continue-on-error: true
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          pattern: ci-test-pass-shard-*
          merge-multiple: true
          path: ${{ runner.temp }}/ci-test-pass-shards
      - name: Merge test timing artifact
        id: merge
        if: always()
        continue-on-error: true
        env:
          SOURCE_BRANCH: ${{ github.head_ref || github.ref_name }}
        run: |
          set +e
          python3 scripts/ci_test_timing_report.py prepare-shards \
            --input-dir "$RUNNER_TEMP/ci-test-pass-shards" \
            --output-junit "$RUNNER_TEMP/merged-junit.xml" \
            --output-timing "$RUNNER_TEMP/merged-timing.json"
          PREPARE_STATUS=$?
          if [ "$PREPARE_STATUS" -ne 0 ]; then
            echo "test_status=1" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          SHARD_COUNT="$(python3 -c 'import json, pathlib; path = pathlib.Path("'"$RUNNER_TEMP/merged-timing.json"'"); data = json.loads(path.read_text(encoding="utf-8")) if path.exists() else {}; print(int(data.get("shard_total") or 0))')"
          mkdir -p "$RUNNER_TEMP/ci-test-timing-artifact"
          set +e
          python3 scripts/ci_test_timing_report.py merge \
            --output-dir "$RUNNER_TEMP/ci-test-timing-artifact" \
            --source-sha "$GITHUB_SHA" \
            --source-branch "$SOURCE_BRANCH" \
            --workflow-run-id "$GITHUB_RUN_ID" \
            --passes-sharded \
            --shard-count "$SHARD_COUNT" \
            --pass ci \
            --profile ci \
            --junit "$RUNNER_TEMP/merged-junit.xml" \
            --timing "$RUNNER_TEMP/merged-timing.json"
          MERGE_STATUS=$?
          python3 scripts/ci_test_timing_report.py render \
            "$RUNNER_TEMP/ci-test-timing-artifact/summary.json" \
            --output-dir "$RUNNER_TEMP/ci-test-timing-artifact" \
            --compact
          RENDER_STATUS=$?
          if [ -f "$RUNNER_TEMP/ci-test-timing-artifact/report.md" ]; then
            cat "$RUNNER_TEMP/ci-test-timing-artifact/report.md" >> "$GITHUB_STEP_SUMMARY"
          fi
          TEST_STATUS="$(python3 -c 'import json, pathlib; path = pathlib.Path("'"$RUNNER_TEMP/merged-timing.json"'"); data = json.loads(path.read_text(encoding="utf-8")) if path.exists() else {}; print(int(data.get("exit_code", 1)))')"
          echo "test_status=$TEST_STATUS" >> "$GITHUB_OUTPUT"
          if [ "$MERGE_STATUS" -ne 0 ] || [ "$RENDER_STATUS" -ne 0 ]; then
            exit 1
          fi
      - name: Upload test timing artifact
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: ci-test-timing-data
          path: ${{ runner.temp }}/ci-test-timing-artifact
          if-no-files-found: warn
          retention-days: 30
      - name: Fail if test jobs failed
        if: always()
        run: |
          if [ "${{ steps.merge.outcome }}" = "failure" ]; then
            exit 1
          fi
          if [ "${{ needs.test.result }}" = "failure" ]; then
            exit 1
          fi

  typos:
    name: Typos
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Check spelling
        uses: crate-ci/typos@6ac2ebd1b93eade61faf7e12688ad87a073fea59 # v1.46.0
        with:
          files: .
