name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: ["**", main]

permissions:
  contents: read

env:
  RUSTFLAGS: -D warnings
  CARGO_TERM_COLOR: always

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions-rust-lang/setup-rust-toolchain@a0b538fa0b742a6aa35d6e2c169b4bd06d225a98 # v1
        with:
          components: rustfmt
      - name: Check formatting
        run: cargo fmt --all --check

  taplo:
    name: TOML format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Install taplo
        uses: taiki-e/install-action@f092c064826410a38929a5791d2c0225b94432fe # taplo-cli
        with:
          tool: taplo-cli
      - name: Check TOML formatting
        run: taplo fmt --check

  rust-file-lines:
    name: Rust file line cap
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Test Rust file line checker
        run: scripts/test-rust-file-lines.sh
      - name: Enforce Rust file line cap (zero exceptions)
        run: scripts/check-rust-file-lines.sh --no-baseline

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions-rust-lang/setup-rust-toolchain@a0b538fa0b742a6aa35d6e2c169b4bd06d225a98 # v1
        with:
          components: clippy
      - name: Clippy (all features)
        run: cargo clippy --all --all-targets --all-features -- -D warnings
      - name: Clippy (no default features)
        run: cargo clippy --all --all-targets --no-default-features -- -D warnings
      - name: Crate dependency hygiene
        run: |
          scripts/check-crate-deps.sh akita-verifier
          scripts/check-crate-deps.sh akita-prover
          scripts/check-crate-deps.sh akita-config
          scripts/check-crate-deps.sh akita-planner
          scripts/check-crate-deps.sh akita-setup

  machete:
    name: Unused dependencies
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Install cargo-machete
        uses: taiki-e/install-action@f092c064826410a38929a5791d2c0225b94432fe # cargo-machete
        with:
          tool: cargo-machete
      - name: Check unused dependencies
        run: cargo machete --with-metadata

  doc:
    name: Documentation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions-rust-lang/setup-rust-toolchain@a0b538fa0b742a6aa35d6e2c169b4bd06d225a98 # v1
      - name: Build documentation
        run: cargo doc -q --no-deps --all-features
        env:
          RUSTDOCFLAGS: -D warnings

  test-non-zk:
    name: Test (non-zk ${{ strategy.job-index }}/${{ strategy.job-total }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions-rust-lang/setup-rust-toolchain@a0b538fa0b742a6aa35d6e2c169b4bd06d225a98 # v1
      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@23869a5bd66c73db3c0ac40331f3206eb23791dc # v2.9.1
        with:
          shared-key: ci-test-non-zk
          add-job-id-key: false
          cache-on-failure: true
      - name: Install cargo-nextest
        uses: taiki-e/install-action@f092c064826410a38929a5791d2c0225b94432fe # nextest
      - name: Run tests (all non-zk features)
        env:
          SHARD_INDEX: ${{ strategy.job-index }}
          SHARD_TOTAL: ${{ strategy.job-total }}
        run: |
          artifact_dir="$RUNNER_TEMP/ci-test-pass-non-zk-shard-${SHARD_INDEX}"
          mkdir -p "$artifact_dir"
          start_epoch=$(date +%s)
          set +e
          cargo nextest run --profile ci-non-zk --no-default-features --features parallel,disk-persistence \
            --partition "slice:${SHARD_INDEX}/${SHARD_TOTAL}"
          status=$?
          set -e
          end_epoch=$(date +%s)
          cp target/nextest/ci-non-zk/junit.xml "$artifact_dir/junit-shard-${SHARD_INDEX}.xml"
          printf '{"started_at_epoch":%s,"finished_at_epoch":%s,"exit_code":%s,"shard_index":%s,"shard_total":%s}\n' \
            "$start_epoch" "$end_epoch" "$status" "$SHARD_INDEX" "$SHARD_TOTAL" \
            > "$artifact_dir/timing-shard-${SHARD_INDEX}.json"
          exit "$status"
      - name: Upload non-zk shard artifact
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: ci-test-pass-non-zk-shard-${{ strategy.job-index }}
          path: ${{ runner.temp }}/ci-test-pass-non-zk-shard-${{ strategy.job-index }}
          if-no-files-found: warn
          retention-days: 7

  test-all-features:
    name: Test (all-features ${{ strategy.job-index }}/${{ strategy.job-total }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions-rust-lang/setup-rust-toolchain@a0b538fa0b742a6aa35d6e2c169b4bd06d225a98 # v1
      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@23869a5bd66c73db3c0ac40331f3206eb23791dc # v2.9.1
        with:
          shared-key: ci-test-all-features
          add-job-id-key: false
          cache-on-failure: true
      - name: Install cargo-nextest
        uses: taiki-e/install-action@f092c064826410a38929a5791d2c0225b94432fe # nextest
      - name: Run tests (all features)
        env:
          SHARD_INDEX: ${{ strategy.job-index }}
          SHARD_TOTAL: ${{ strategy.job-total }}
        run: |
          artifact_dir="$RUNNER_TEMP/ci-test-pass-all-features-shard-${SHARD_INDEX}"
          mkdir -p "$artifact_dir"
          start_epoch=$(date +%s)
          set +e
          # akita-field defines no zk feature; its tests are field-arithmetic only and
          # already run in the non-zk leg above. Exclude them here to keep the zk
          # test coverage narrow (see #75).
          cargo nextest run --profile ci-all-features --all-features -E 'not (package(akita-field))' \
            --partition "slice:${SHARD_INDEX}/${SHARD_TOTAL}"
          status=$?
          set -e
          end_epoch=$(date +%s)
          cp target/nextest/ci-all-features/junit.xml "$artifact_dir/junit-shard-${SHARD_INDEX}.xml"
          printf '{"started_at_epoch":%s,"finished_at_epoch":%s,"exit_code":%s,"shard_index":%s,"shard_total":%s}\n' \
            "$start_epoch" "$end_epoch" "$status" "$SHARD_INDEX" "$SHARD_TOTAL" \
            > "$artifact_dir/timing-shard-${SHARD_INDEX}.json"
          exit "$status"
      - name: Upload all-features shard artifact
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: ci-test-pass-all-features-shard-${{ strategy.job-index }}
          path: ${{ runner.temp }}/ci-test-pass-all-features-shard-${{ strategy.job-index }}
          if-no-files-found: warn
          retention-days: 7

  test-timing:
    name: Test timing
    needs: [test-non-zk, test-all-features]
    if: >-
      always() &&
      needs.test-non-zk.result != 'cancelled' &&
      needs.test-all-features.result != 'cancelled'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Test timing script fixtures
        run: python3 -m unittest discover -s scripts/tests -p "test_*.py"
      - name: Download non-zk shard artifacts
        continue-on-error: true
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          pattern: ci-test-pass-non-zk-shard-*
          merge-multiple: true
          path: ${{ runner.temp }}/ci-test-pass-non-zk-shards
      - name: Download all-features shard artifacts
        continue-on-error: true
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          pattern: ci-test-pass-all-features-shard-*
          merge-multiple: true
          path: ${{ runner.temp }}/ci-test-pass-all-features-shards
      - name: Merge test timing artifact
        id: merge
        if: always()
        env:
          SOURCE_BRANCH: ${{ github.head_ref || github.ref_name }}
        run: |
          read_timing() {
            local path="$1"
            if [ ! -f "$path" ]; then
              echo "0 0 1"
              return
            fi
            python3 - "$path" <<'PY'
          import json, sys
          data = json.load(open(sys.argv[1], encoding="utf-8"))
          print(
              data.get("started_at_epoch", 0),
              data.get("finished_at_epoch", 0),
              data.get("exit_code", 1),
          )
          PY
          }

          set +e
          python3 scripts/ci_test_timing_report.py prepare-pass \
            --input-dir "$RUNNER_TEMP/ci-test-pass-non-zk-shards" \
            --output-junit "$RUNNER_TEMP/merged-non-zk-junit.xml" \
            --output-timing "$RUNNER_TEMP/merged-non-zk-timing.json"
          NON_ZK_PREPARE_STATUS=$?
          python3 scripts/ci_test_timing_report.py prepare-pass \
            --input-dir "$RUNNER_TEMP/ci-test-pass-all-features-shards" \
            --output-junit "$RUNNER_TEMP/merged-all-features-junit.xml" \
            --output-timing "$RUNNER_TEMP/merged-all-features-timing.json"
          ALL_FEATURES_PREPARE_STATUS=$?
          set -e

          set -- "$(read_timing "$RUNNER_TEMP/merged-non-zk-timing.json")"
          NON_ZK_START=$1 NON_ZK_END=$2 NON_ZK_STATUS=$3
          set -- "$(read_timing "$RUNNER_TEMP/merged-all-features-timing.json")"
          ALL_FEATURES_START=$1 ALL_FEATURES_END=$2 ALL_FEATURES_STATUS=$3
          if [ "$NON_ZK_PREPARE_STATUS" -ne 0 ]; then
            NON_ZK_STATUS=1
          fi
          if [ "$ALL_FEATURES_PREPARE_STATUS" -ne 0 ]; then
            ALL_FEATURES_STATUS=1
          fi

          mkdir -p "$RUNNER_TEMP/ci-test-timing-artifact"
          python3 scripts/ci_test_timing_report.py merge \
            --output-dir "$RUNNER_TEMP/ci-test-timing-artifact" \
            --source-sha "$GITHUB_SHA" \
            --source-branch "$SOURCE_BRANCH" \
            --workflow-run-id "$GITHUB_RUN_ID" \
            --passes-parallel \
            --passes-sharded \
            --shard-count "$(python3 -c 'import json; print(json.load(open("'"$RUNNER_TEMP/merged-non-zk-timing.json"'", encoding="utf-8")).get("shard_total", 0))')" \
            --pass non-zk \
            --junit "$RUNNER_TEMP/merged-non-zk-junit.xml" \
            --started-at "$NON_ZK_START" \
            --finished-at "$NON_ZK_END" \
            --exit-code "$NON_ZK_STATUS" \
            --pass all-features \
            --junit "$RUNNER_TEMP/merged-all-features-junit.xml" \
            --started-at "$ALL_FEATURES_START" \
            --finished-at "$ALL_FEATURES_END" \
            --exit-code "$ALL_FEATURES_STATUS"
          python3 scripts/ci_test_timing_report.py render \
            "$RUNNER_TEMP/ci-test-timing-artifact/summary.json" \
            --output-dir "$RUNNER_TEMP/ci-test-timing-artifact" \
            --compact
          cat "$RUNNER_TEMP/ci-test-timing-artifact/report.md" >> "$GITHUB_STEP_SUMMARY"
          {
            echo "non_zk_status=$NON_ZK_STATUS"
            echo "all_features_status=$ALL_FEATURES_STATUS"
          } >> "$GITHUB_OUTPUT"
      - name: Upload test timing artifact
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: ci-test-timing-data
          path: ${{ runner.temp }}/ci-test-timing-artifact
          if-no-files-found: warn
          retention-days: 30
      - name: Fail if any test pass failed
        if: always()
        env:
          NON_ZK_STATUS: ${{ steps.merge.outputs.non_zk_status }}
          ALL_FEATURES_STATUS: ${{ steps.merge.outputs.all_features_status }}
          NON_ZK_NEEDS: ${{ needs.test-non-zk.result }}
          ALL_FEATURES_NEEDS: ${{ needs.test-all-features.result }}
        run: |
          if [ "$NON_ZK_NEEDS" = "failure" ] || [ "$ALL_FEATURES_NEEDS" = "failure" ]; then
            exit 1
          fi
          if [ "${NON_ZK_STATUS:-1}" != "0" ]; then
            exit 1
          fi
          if [ "${ALL_FEATURES_STATUS:-1}" != "0" ]; then
            exit 1
          fi

  typos:
    name: Typos
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Check spelling
        uses: crate-ci/typos@6ac2ebd1b93eade61faf7e12688ad87a073fea59 # v1.46.0
        with:
          files: .
