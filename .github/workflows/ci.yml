name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: ["**", main]

permissions:
  contents: read

env:
  RUSTFLAGS: -D warnings
  CARGO_TERM_COLOR: always

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions-rust-lang/setup-rust-toolchain@a0b538fa0b742a6aa35d6e2c169b4bd06d225a98 # v1
        with:
          components: rustfmt
      - name: Check formatting
        run: cargo fmt --all --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions-rust-lang/setup-rust-toolchain@a0b538fa0b742a6aa35d6e2c169b4bd06d225a98 # v1
        with:
          components: clippy
      - name: Clippy (all features)
        run: cargo clippy --all --all-targets --all-features -- -D warnings
      - name: Clippy (no default features)
        run: cargo clippy --all --all-targets --no-default-features -- -D warnings
      - name: Crate dependency hygiene
        run: |
          scripts/check-crate-deps.sh akita-verifier
          scripts/check-crate-deps.sh akita-prover
          scripts/check-crate-deps.sh akita-config
          scripts/check-crate-deps.sh akita-setup
          scripts/check-crate-deps.sh akita-scheme

  doc:
    name: Documentation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions-rust-lang/setup-rust-toolchain@a0b538fa0b742a6aa35d6e2c169b4bd06d225a98 # v1
      - name: Build documentation
        run: cargo doc -q --no-deps --all-features
        env:
          RUSTDOCFLAGS: -D warnings

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions-rust-lang/setup-rust-toolchain@a0b538fa0b742a6aa35d6e2c169b4bd06d225a98 # v1
      - name: Install cargo-nextest
        uses: taiki-e/install-action@f092c064826410a38929a5791d2c0225b94432fe # nextest
      - name: Run tests
        run: cargo nextest run --all-features
      - name: Run ZK commitment hiding tests
        run: cargo test -p akita-pcs --features zk --test zk_commitment_hiding
      - name: Planner validation
        run: cargo run -p akita-planner --bin akita-planner -- --validate
