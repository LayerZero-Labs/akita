name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: ["**", main]

permissions:
  contents: read

env:
  RUSTFLAGS: -D warnings
  CARGO_TERM_COLOR: always

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions-rust-lang/setup-rust-toolchain@a0b538fa0b742a6aa35d6e2c169b4bd06d225a98 # v1
        with:
          components: rustfmt
      - name: Check formatting
        run: cargo fmt --all --check

  taplo:
    name: TOML format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Install taplo
        uses: taiki-e/install-action@f092c064826410a38929a5791d2c0225b94432fe # taplo-cli
        with:
          tool: taplo-cli
      - name: Check TOML formatting
        run: taplo fmt --check

  rust-file-lines:
    name: Rust file line cap
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Test Rust file line checker
        run: scripts/test-rust-file-lines.sh
      - name: Enforce Rust file line cap (zero exceptions)
        run: scripts/check-rust-file-lines.sh --no-baseline

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions-rust-lang/setup-rust-toolchain@a0b538fa0b742a6aa35d6e2c169b4bd06d225a98 # v1
        with:
          components: clippy
      - name: Clippy (all features)
        run: cargo clippy --all --all-targets --all-features -- -D warnings
      - name: Clippy (no default features)
        run: cargo clippy --all --all-targets --no-default-features -- -D warnings
      - name: Crate dependency hygiene
        run: |
          scripts/check-crate-deps.sh akita-verifier
          scripts/check-crate-deps.sh akita-prover
          scripts/check-crate-deps.sh akita-config
          scripts/check-crate-deps.sh akita-planner
          scripts/check-crate-deps.sh akita-setup

  machete:
    name: Unused dependencies
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Install cargo-machete
        uses: taiki-e/install-action@f092c064826410a38929a5791d2c0225b94432fe # cargo-machete
        with:
          tool: cargo-machete
      - name: Check unused dependencies
        run: cargo machete --with-metadata

  doc:
    name: Documentation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions-rust-lang/setup-rust-toolchain@a0b538fa0b742a6aa35d6e2c169b4bd06d225a98 # v1
      - name: Build documentation
        run: cargo doc -q --no-deps --all-features
        env:
          RUSTDOCFLAGS: -D warnings

  test-non-zk:
    name: Test (non-zk)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions-rust-lang/setup-rust-toolchain@a0b538fa0b742a6aa35d6e2c169b4bd06d225a98 # v1
      - name: Install cargo-nextest
        uses: taiki-e/install-action@f092c064826410a38929a5791d2c0225b94432fe # nextest
      - name: Run tests (all non-zk features)
        run: |
          artifact_dir="$RUNNER_TEMP/ci-test-pass-non-zk"
          mkdir -p "$artifact_dir"
          start_epoch=$(date +%s)
          set +e
          cargo nextest run --profile ci-non-zk --no-default-features --features parallel,disk-persistence
          status=$?
          set -e
          end_epoch=$(date +%s)
          cp target/nextest/ci-non-zk/junit.xml "$artifact_dir/junit.xml"
          printf '{"started_at_epoch":%s,"finished_at_epoch":%s,"exit_code":%s}\n' \
            "$start_epoch" "$end_epoch" "$status" > "$artifact_dir/timing.json"
          exit "$status"
      - name: Upload non-zk pass artifact
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: ci-test-pass-non-zk
          path: ${{ runner.temp }}/ci-test-pass-non-zk
          if-no-files-found: warn
          retention-days: 7

  test-all-features:
    name: Test (all-features)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions-rust-lang/setup-rust-toolchain@a0b538fa0b742a6aa35d6e2c169b4bd06d225a98 # v1
      - name: Install cargo-nextest
        uses: taiki-e/install-action@f092c064826410a38929a5791d2c0225b94432fe # nextest
      - name: Run tests (all features)
        run: |
          artifact_dir="$RUNNER_TEMP/ci-test-pass-all-features"
          mkdir -p "$artifact_dir"
          start_epoch=$(date +%s)
          set +e
          # akita-field defines no zk feature; its tests are field-arithmetic only and
          # already run in the non-zk leg above. Exclude them here to keep the zk
          # test coverage narrow (see #75).
          cargo nextest run --profile ci-all-features --all-features -E 'not (package(akita-field))'
          status=$?
          set -e
          end_epoch=$(date +%s)
          cp target/nextest/ci-all-features/junit.xml "$artifact_dir/junit.xml"
          printf '{"started_at_epoch":%s,"finished_at_epoch":%s,"exit_code":%s}\n' \
            "$start_epoch" "$end_epoch" "$status" > "$artifact_dir/timing.json"
          exit "$status"
      - name: Upload all-features pass artifact
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: ci-test-pass-all-features
          path: ${{ runner.temp }}/ci-test-pass-all-features
          if-no-files-found: warn
          retention-days: 7

  test-timing:
    name: Test timing
    needs: [test-non-zk, test-all-features]
    if: >-
      always() &&
      needs.test-non-zk.result != 'cancelled' &&
      needs.test-all-features.result != 'cancelled'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Test timing script fixtures
        run: python3 -m unittest discover -s scripts/tests -p "test_*.py"
      - name: Download non-zk pass artifact
        continue-on-error: true
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: ci-test-pass-non-zk
          path: ${{ runner.temp }}/ci-test-pass-non-zk
      - name: Download all-features pass artifact
        continue-on-error: true
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: ci-test-pass-all-features
          path: ${{ runner.temp }}/ci-test-pass-all-features
      - name: Merge test timing artifact
        id: merge
        if: always()
        run: |
          read_timing() {
            local path="$1"
            if [ ! -f "$path" ]; then
              echo "0 0 1"
              return
            fi
            python3 - "$path" <<'PY'
          import json, sys
          data = json.load(open(sys.argv[1], encoding="utf-8"))
          print(
              data.get("started_at_epoch", 0),
              data.get("finished_at_epoch", 0),
              data.get("exit_code", 1),
          )
          PY
          }

          set -- $(read_timing "$RUNNER_TEMP/ci-test-pass-non-zk/timing.json")
          NON_ZK_START=$1 NON_ZK_END=$2 NON_ZK_STATUS=$3
          set -- $(read_timing "$RUNNER_TEMP/ci-test-pass-all-features/timing.json")
          ALL_FEATURES_START=$1 ALL_FEATURES_END=$2 ALL_FEATURES_STATUS=$3

          mkdir -p "$RUNNER_TEMP/ci-test-timing-artifact"
          python3 scripts/ci_test_timing_report.py merge \
            --output-dir "$RUNNER_TEMP/ci-test-timing-artifact" \
            --source-sha "$GITHUB_SHA" \
            --source-branch "${{ github.head_ref || github.ref_name }}" \
            --workflow-run-id "$GITHUB_RUN_ID" \
            --passes-parallel \
            --pass non-zk \
            --junit "$RUNNER_TEMP/ci-test-pass-non-zk/junit.xml" \
            --started-at "$NON_ZK_START" \
            --finished-at "$NON_ZK_END" \
            --exit-code "$NON_ZK_STATUS" \
            --pass all-features \
            --junit "$RUNNER_TEMP/ci-test-pass-all-features/junit.xml" \
            --started-at "$ALL_FEATURES_START" \
            --finished-at "$ALL_FEATURES_END" \
            --exit-code "$ALL_FEATURES_STATUS"
          python3 scripts/ci_test_timing_report.py render \
            "$RUNNER_TEMP/ci-test-timing-artifact/summary.json" \
            --output-dir "$RUNNER_TEMP/ci-test-timing-artifact" \
            --compact
          cat "$RUNNER_TEMP/ci-test-timing-artifact/report.md" >> "$GITHUB_STEP_SUMMARY"
          {
            echo "non_zk_status=$NON_ZK_STATUS"
            echo "all_features_status=$ALL_FEATURES_STATUS"
          } >> "$GITHUB_OUTPUT"
      - name: Upload test timing artifact
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: ci-test-timing-data
          path: ${{ runner.temp }}/ci-test-timing-artifact
          if-no-files-found: warn
          retention-days: 30
      - name: Fail if any test pass failed
        if: always()
        run: |
          if [ "${{ steps.merge.outputs.non_zk_status || '1' }}" -ne 0 ]; then
            exit "${{ steps.merge.outputs.non_zk_status || '1' }}"
          fi
          if [ "${{ steps.merge.outputs.all_features_status || '1' }}" -ne 0 ]; then
            exit "${{ steps.merge.outputs.all_features_status || '1' }}"
          fi

  typos:
    name: Typos
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Check spelling
        uses: crate-ci/typos@6ac2ebd1b93eade61faf7e12688ad87a073fea59 # v1.46.0
        with:
          files: .
